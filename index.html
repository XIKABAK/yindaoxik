<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗻 跳转</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background-color: #ffe4e1; /* 兜底颜色 */
        }

        /* 背景层容器 */
        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* 低质量模糊背景 (极速加载) */
        .bg-low {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1545569341-9eb8b30979d9?q=80&w=20&auto=format&fit=crop') center/cover no-repeat;
            filter: blur(8px);
            transform: scale(1.02); /* 消除模糊边缘白边 */
            z-index: 0;
        }

        /* 高质量原图 (初始透明，加载后渐显) */
        .bg-high {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1545569341-9eb8b30979d9?q=80&w=1200&auto=format&fit=crop') center/cover no-repeat;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            z-index: 0;
        }

        /* 粉色柔光遮罩 (位于背景之上，内容之下) */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 240, 245, 0.2);
            z-index: 1;
            pointer-events: none;
        }

        /* 金色光晕点缀 (同样位于背景之上) */
        .gold-glow {
            position: absolute;
            bottom: 5%;
            right: 5%;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(255,215,0,0.25) 0%, rgba(255,200,150,0.1) 60%, transparent 80%);
            border-radius: 50%;
            filter: blur(60px);
            z-index: 1;
            pointer-events: none;
        }

        .gold-glow-left {
            top: 10%;
            left: 5%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #ffb7c5 0%, #ffe4b5 70%, transparent 90%);
            filter: blur(70px);
            position: absolute;
            z-index: 1;
            pointer-events: none;
        }

        /* 主按钮卡片 (位于最上层) */
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 40px 70px;
            border: 2px solid rgba(255, 215, 0, 0.45);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 215, 0, 0.2) inset;
            max-width: 90%;
        }

        .btn {
            display: inline-block;
            background: rgba(255, 245, 250, 0.35);
            backdrop-filter: blur(8px);
            border: 2px solid #f4c542;
            color: #b8860b;
            font-size: 2rem;
            font-weight: 500;
            padding: 18px 54px;
            border-radius: 50px;
            text-decoration: none;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(244, 197, 66, 0.3);
            text-shadow: 0 2px 5px rgba(255, 235, 200, 0.8);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.55);
            border-color: #ffb347;
            box-shadow: 0 15px 35px rgba(255, 180, 70, 0.5);
            transform: translateY(-4px);
            color: #7f5f0b;
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 8px 20px rgba(255, 200, 0, 0.4);
        }

        .warm-text {
            margin-top: 20px;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            letter-spacing: 2px;
            font-weight: 300;
        }

        @media (max-width: 600px) {
            .content {
                padding: 30px 30px;
            }
            .btn {
                font-size: 1.5rem;
                padding: 14px 35px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景层 (低质量模糊 + 高质量原图) -->
    <div class="bg-layer">
        <div class="bg-low"></div>
        <div class="bg-high" id="bgHigh"></div>
    </div>

    <!-- 遮罩与光晕 -->
    <div class="overlay"></div>
    <div class="gold-glow"></div>
    <div class="gold-glow-left"></div>

    <!-- 主按钮卡片 -->
    <div class="content">
        <a href="https://xikabak.vip" class="btn" target="_blank" rel="noopener noreferrer">🗻 跳转至主网站</a>
        <div class="warm-text"> </div>
    </div>

    <script>
        (function() {
            // 预加载高质量图片
            const highResUrl = 'https://images.unsplash.com/photo-1545569341-9eb8b30979d9?q=80&w=1200&auto=format&fit=crop';
            const img = new Image();
            img.src = highResUrl;
            img.onload = function() {
                // 加载完成后，渐显高质量背景层
                document.getElementById('bgHigh').style.opacity = '1';
            };
            // 可选：如果加载失败，保持低质量背景（但什么都不做）
        })();
    </script>
</body>
</html>
