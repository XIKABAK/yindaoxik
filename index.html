<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hello homo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background-color: #ffe4ec;
        }

        .bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: opacity 2.5s ease-in-out;
            opacity: 0;
        }

        .bg-layer.active {
            opacity: 1;
        }

        .sakura {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .sakura span {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            background: rgba(255, 230, 240, 0.8);
            border-radius: 80% 0 60% 40% / 60% 40% 60% 40%;
            transform: rotate(45deg);
            box-shadow: 0 0 15px #ffd5d5;
            animation: fall 8s linear infinite;
            opacity: 0.6;
        }

        .sakura span:nth-child(1) { left: 10%; width: 15px; height: 15px; animation-duration: 10s; animation-delay: 0s; background: rgba(255, 220, 220, 0.7); }
        .sakura span:nth-child(2) { left: 30%; width: 25px; height: 25px; animation-duration: 14s; animation-delay: 2s; background: rgba(255, 200, 210, 0.8); }
        .sakura span:nth-child(3) { left: 50%; width: 18px; height: 18px; animation-duration: 9s; animation-delay: 4s; background: rgba(255, 210, 225, 0.7); }
        .sakura span:nth-child(4) { left: 70%; width: 22px; height: 22px; animation-duration: 12s; animation-delay: 1s; background: rgba(255, 185, 200, 0.8); }
        .sakura span:nth-child(5) { left: 85%; width: 16px; height: 16px; animation-duration: 11s; animation-delay: 3s; background: rgba(255, 225, 235, 0.7); }
        .sakura span:nth-child(6) { left: 95%; width: 20px; height: 20px; animation-duration: 15s; animation-delay: 5s; background: rgba(255, 190, 205, 0.8); }
        .sakura span:nth-child(7) { left: 20%; width: 17px; height: 17px; animation-duration: 13s; animation-delay: 6s; background: rgba(255, 215, 220, 0.7); }
        .sakura span:nth-child(8) { left: 40%; width: 23px; height: 23px; animation-duration: 8s; animation-delay: 7s; background: rgba(255, 205, 215, 0.8); }
        .sakura span:nth-child(9) { left: 60%; width: 19px; height: 19px; animation-duration: 10s; animation-delay: 8s; background: rgba(255, 195, 210, 0.7); }
        .sakura span:nth-child(10) { left: 80%; width: 21px; height: 21px; animation-duration: 12s; animation-delay: 9s; background: rgba(255, 185, 200, 0.8); }

        @keyframes fall {
            0% {
                top: -10%;
                transform: translateX(0) rotate(0deg);
                opacity: 0.6;
            }
            100% {
                top: 110%;
                transform: translateX(30px) rotate(360deg);
                opacity: 0.2;
            }
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(6px);
            border-radius: 40px;
            padding: 20px 30px;
            border: 2px solid rgba(255, 215, 0, 0.25);
            box-shadow: 0 15px 30px rgba(255, 180, 180, 0.2);
            max-width: 80%;
        }

        .btn {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            border: 2px solid #ffd966;
            color: #b8860b;
            font-size: 1.3rem;
            font-weight: 500;
            padding: 10px 28px;
            border-radius: 40px;
            text-decoration: none;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(255, 200, 0, 0.2);
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.3);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.35);
            border-color: #ffc125;
            box-shadow: 0 8px 20px rgba(255, 180, 0, 0.3);
            transform: translateY(-2px);
            color: #856108;
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 10px rgba(255, 200, 0, 0.2);
        }

        @media (max-width: 600px) {
            .content {
                padding: 16px 24px;
            }
            .btn {
                font-size: 1.1rem;
                padding: 8px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-container">
        <div class="bg-layer" id="bg1"></div>
        <div class="bg-layer" id="bg2"></div>
    </div>

    <div class="sakura">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="content">
        <a href="https://xikabak.vip" class="btn" target="_blank" rel="noopener noreferrer">🌸 跳转至主网站</a>
    </div>

                "https://images.pexels.com/photos/672630/pexels-photo-672630.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2",
                "https://images.pexels.com/photos/1266810/pexels-photo-1266810.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2",
                "https://images.pexels.com/photos/161928/pexels-photo-161928.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2",

                "https://images.pexels.com/photos/2891098/pexels-photo-2891098.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2",
                "https://images.pexels.com/photos/2891099/pexels-photo-2891099.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2",
                "https://images.pexels.com/photos/2891100/pexels-photo-2891100.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2",
                "https://images.pexels.com/photos/2891101/pexels-photo-2891101.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2",
                "https://images.pexels.com/photos/2909375/pexels-photo-2909375.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2",
                "https://images.pexels.com/photos/2909376/pexels-photo-2909376.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2",
                "https://images.pexels.com/photos/2909377/pexels-photo-2909377.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2",
                "https://images.pexels.com/photos/2909378/pexels-photo-2909378.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2",
                "https://images.pexels.com/photos/2909379/pexels-photo-2909379.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2",
                "https://images.pexels.com/photos/2911528/pexels-photo-2911528.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2",
                "https://images.pexels.com/photos/2911529/pexels-photo-2911529.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2",
                "https://images.pexels.com/photos/2911530/pexels-photo-2911530.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2",
                "https://images.pexels.com/photos/2911531/pexels-photo-2911531.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2",

                "https://images.unsplash.com/photo-1520065789130-1d1b4b8d7ba6?w=1600",

                "https://images.unsplash.com/photo-1520065789130-1d1b4b8d7ba8?w=1600",

                "https://images.unsplash.com/photo-1520065789130-1d1b4b8d7baa?w=1600",
                "https://images.unsplash.com/photo-1520065789130-1d1b4b8d7bab?w=1600",
                "https://images.unsplash.com/photo-1520065789130-1d1b4b8d7bac?w=1600",
                "https://images.unsplash.com/photo-1520065789130-1d1b4b8d7bad?w=1600",
                "https://images.unsplash.com/photo-1520065789130-1d1b4b8d7bae?w=1600",
                "https://images.unsplash.com/photo-1520065789130-1d1b4b8d7baf?w=1600"
            ];

            const bg1 = document.getElementById('bg1');
            const bg2 = document.getElementById('bg2');
            let activeIndex = 0;
            let currentIndex = 0; // 用于顺序取图

            // 生成低分辨率URL (通过 weserv 服务，宽度50，质量10)
            function getLowResUrl(highResUrl) {
                const encodedUrl = encodeURIComponent(highResUrl);
                return `https://images.weserv.nl/?url=${encodedUrl}&w=50&we&q=10`;
            }

            // 初始化一个背景层：先设置低分辨率，再异步加载高清替换
            function initLayer(layer, highResUrl) {
                const lowRes = getLowResUrl(highResUrl);
                layer.style.backgroundImage = `url('${lowRes}')`;
                const img = new Image();
                img.onload = () => {
                    layer.style.backgroundImage = `url('${highResUrl}')`;
                };
                img.src = highResUrl;
            }

            // 获取下一张高清图
            function getNextImage() {
                const img = sakuraImages[currentIndex % sakuraImages.length];
                currentIndex++;
                return img;
            }

            // 初始化第一张和第二张
            const firstImg = getNextImage();
            const secondImg = getNextImage();
            initLayer(bg1, firstImg);
            initLayer(bg2, secondImg);
            bg1.classList.add('active');

            function switchBackground() {
                const current = activeIndex === 0 ? bg1 : bg2;
                const next = activeIndex === 0 ? bg2 : bg1;

                // 获取下一张高清图
                const highRes = getNextImage();
                const lowRes = getLowResUrl(highRes);

                // 先设置低分辨率
                next.style.backgroundImage = `url('${lowRes}')`;

                // 预加载高清并替换
                const img = new Image();
                img.onload = () => {
                    // 无论当前层是否活跃，更新为高清（确保下次显示时是高清）
                    next.style.backgroundImage = `url('${highRes}')`;
                };
                img.src = highRes;

                // 切换活跃层
                current.classList.remove('active');
                next.classList.add('active');

                activeIndex = 1 - activeIndex;
            }

            setInterval(switchBackground, 10000); // 10秒切换
        })();
    </script>
</body>
